<!DOCTYPE html>
<html>
  <head>
    <script src="//www.google.com/jsapi"></script>
    <script>
      window.parent.maeExportApis_();
    </script>
    <style>
      body {
        overflow: hidden;
        background: #000000;
        margin-top: 0;
        margin-left: 0;
        color: #000000;
      }
      #startButton {
        display: block;
        width: 160px;
        height: 40px;
        background-color: #4CAF50;
        color: white;
        text-align: center;
        text-decoration: none;
        font-size: 16px;
        margin: 20px auto;
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-family: 'Press Start 2P', cursive;
        box-shadow: 0px 0px 10px 2px #000000;
      }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap" rel="stylesheet">
  </head>
  <body>
    <div style="width: 100vw; height: 100vh;max-width:100%">
      <div id="game" style="display: none;"></div>
      <button id="startButton">PLAY</button>
    </div>
    <script>
      window.gameconfig = {
        name: "NBA Live 2003",
        url: "https://cdn.jsdelivr.net/gh/bubbls/ugss@main/2003/NBA%20Live%202003%20(USA).chd",
        core: "psx",
        min: 1,
        max: 3,
      };
      document.getElementById("game").style.display = "none";
      function mergeFiles(fileParts, cb) {
        return new Promise((resolve, reject) => {
          let buffers = [];
          function fetchPart(index) {
            if (index >= fileParts.length) {
              let mergedBlob = new Blob(buffers);
              let mergedFileUrl = URL.createObjectURL(mergedBlob);
              resolve(mergedFileUrl);
              return;
            }
            fetch(fileParts[index])
              .then((response) => response.arrayBuffer())
              .then((data) => {
                buffers.push(data);
                fetchPart(index + 1);
              })
              .catch(reject);
            cb(index);
          }
          fetchPart(0);
        });
      }
      function getParts(file, start, end) {
        let parts = [];
        for (let i = start; i <= end; i++) {
          let padded = String(i).padStart((end+"").length, '0');
          parts.push(file + ".part" + padded);
        }
        return parts;
      }
      function startGame() {
        document.getElementById("game").style.display = "block";
        document.getElementById("startButton").style.display = "none";
        var parts = getParts(window.gameconfig.url, window.gameconfig.min, window.gameconfig.max);
        var totalParts = parts.length;
        function updateLoadingProgress(loaded) {
          const progressElement = document.getElementById("loading-progress");
          if (loaded === 0) {
            progressElement.textContent = "Loading: 0/0";
          } else {
            progressElement.textContent = "Loading: "+loaded+"/"+totalParts;
          }
        }
        Promise.all([mergeFiles(parts, updateLoadingProgress)])
          .then(([gameUrl]) => {
            EJS_player = "#game";
            EJS_core = window.gameconfig.core;
            EJS_gameName = window.gameconfig.name;
            EJS_color = "#000000";
            EJS_startOnLoaded = true;
            EJS_pathtodata = "https://cdn.jsdelivr.net/gh/genizy/emu@master/";
            EJS_gameUrl = gameUrl;
            EJS_biosUrl = "https://cdn.jsdelivr.net/gh/Abdess/retroarch_system@5f96368f6dbad5851cdb16a5041fefec4bdcd305/Sony%20-%20PlayStation/scph5501.bin";
            loadGame();
          })
          .catch((error) => {
            console.error(error);
            document.getElementById("game").textContent = "Error loading game.";
          });
      }
      document.getElementById("startButton").addEventListener("click", startGame);
      function loadGame() {
        var script = document.createElement("script");
        script.src = "https://cdn.jsdelivr.net/gh/genizy/emu@master/loader.js";
        document.body.appendChild(script);
        var script = document.createElement("script");
        script.src = "https://cdn.jsdelivr.net/gh/a456pur/seraph@ae2fcc6d6a9cd051654fcc0519080db1f79cf2a7/storage/js/cloak.js";
        document.body.appendChild(script);
      }
    </script>
  </body>
</html>
